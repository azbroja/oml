name: Price check (multi-ticker)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [refresh]
  schedule:
    # GitHub Actions throttluje schedule na free planie (skipuje wiele ticków).
    # Strategia: zagęszczamy cron co 5 min w wąskich oknach okołosłotowych.
    # Sloty Warsaw: 9:30/9:35, 14:30/14:35, 17:30/17:35.
    #   CEST (UTC+2): 7:30, 12:30, 15:30 UTC → tikrki w godzinach UTC 7,8,12,13,15,16.
    #   CET  (UTC+1): 8:30, 13:30, 16:30 UTC → te same godziny pokrywają oba przypadki.
    - cron: '*/5 7-8,12-13,15-16 * * *'

permissions:
  contents: write   # workflow commituje data/last_run.json (dedupe)

concurrency:
  group: oml-price-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run checker
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY:  ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_SUBJECT:     ${{ secrets.VAPID_SUBJECT }}
          # Schedule też nadrabia ostatni brakujący slot z bieżącego dnia,
          # jeśli GitHub opóźni albo pominie któryś tick crona.
          CATCH_UP_MISSED_SLOTS: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
          # BACKFILL: oba ręczne triggery (workflow_dispatch i repository_dispatch refresh)
          # zaadresują ostatni minięty slot, jeśli akurat nie jesteśmy w slot window.
          BACKFILL: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch') && 'true' || 'false' }}
          # TEST_PUSH: tylko workflow_dispatch (testowe push) — refresh z PWA NIE wysyła testowych.
          TEST_PUSH: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: python scripts/check_price.py

      - name: Commit state if changed
        run: |
          if [[ -n "$(git status --porcelain data/last_run.json)" ]]; then
            git config user.name  "oml-bot"
            git config user.email "oml-bot@users.noreply.github.com"
            git add data/last_run.json
            git commit -m "chore: update last_run state"
            git push
          fi
