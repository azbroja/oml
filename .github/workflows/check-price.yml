name: Price check (multi-ticker)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [refresh]
  schedule:
    # GitHub Actions potrafi pomijać scheduled runy na free planie.
    # Zamiast wąskich okien odpalamy checker co 5 minut przez całą sesję dzienną,
    # a skrypt sam pilnuje slotów i deduplikacji.
    - cron: '*/5 7-16 * * *'

permissions:
  contents: write   # workflow commituje data/last_run.json (dedupe)

concurrency:
  group: oml-price-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run checker
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY:  ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_SUBJECT:     ${{ secrets.VAPID_SUBJECT }}
          # Schedule też nadrabia ostatni brakujący slot z bieżącego dnia,
          # jeśli GitHub opóźni albo pominie któryś tick crona.
          CATCH_UP_MISSED_SLOTS: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
          # BACKFILL: oba ręczne triggery (workflow_dispatch i repository_dispatch refresh)
          # zaadresują ostatni minięty slot, jeśli akurat nie jesteśmy w slot window.
          BACKFILL: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch') && 'true' || 'false' }}
          # TEST_PUSH: tylko workflow_dispatch (testowe push) — refresh z PWA NIE wysyła testowych.
          TEST_PUSH: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: python scripts/check_price.py

      - name: Commit state if changed
        run: |
          if [[ -n "$(git status --porcelain data/last_run.json data/market_micro.json)" ]]; then
            git config user.name  "oml-bot"
            git config user.email "oml-bot@users.noreply.github.com"
            git add data/last_run.json data/market_micro.json
            git commit -m "chore: update market data"
            git push
          fi
