name: OML price check

on:
  workflow_dispatch:
  schedule:
    # Co 10 minut w "okolicach" 9:30/14:30/17:30 Warsaw (czas letni/zimowy łącznie),
    # tylko w dni robocze. GitHub Actions używa UTC.
    # Zima (UTC+1): 8:30, 13:30, 16:30 UTC.
    # Lato (UTC+2): 7:30, 12:30, 15:30 UTC.
    # Skrypt sam dopasuje "slot" do strefy Europe/Warsaw.
    - cron: '*/10 7-16 * * 1-5'

permissions:
  contents: write   # workflow commituje data/last_run.json (dedupe)

concurrency:
  group: oml-price-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run checker
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY:  ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_SUBJECT:     ${{ secrets.VAPID_SUBJECT }}
          FORCE_NOTIFY:      ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: python scripts/check_price.py

      - name: Commit state if changed
        run: |
          if [[ -n "$(git status --porcelain data/last_run.json)" ]]; then
            git config user.name  "oml-bot"
            git config user.email "oml-bot@users.noreply.github.com"
            git add data/last_run.json
            git commit -m "chore: update last_run state"
            git push
          fi
